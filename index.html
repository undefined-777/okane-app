<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>お小遣い記録アプリ（フルアップデート版）</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .table-container { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; border: 1px solid #ccc; margin-bottom: 20px; }
        table { border-collapse: collapse; min-width: 1500px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: center; background-color: white; }
        
        /* 星型ボタン */
        .count-btn { 
            width: 45px; height: 45px; font-size: 14px; font-weight: bold; cursor: pointer; border: none;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            transition: background-color 0.2s, color 0.2s;
        }
        .count-btn.zero { background-color: #f0f0f0; color: #999; }
        .count-btn.active { background-color: #FFD600; color: #000; }

        /* 今日のハイライト */
        .today-highlight { background-color: #FFEBEE !important; border-left: 2px solid #EF5350 !important; border-right: 2px solid #EF5350 !important; }
        th.today-highlight { background-color: #EF5350 !important; color: white; }

        /* 合計行（フッター）のスタイル */
        .total-row-footer td { background-color: #f5f5f5; font-weight: bold; font-size: 14px; border-top: 2px solid #999; }

        .input-area { margin-bottom: 15px; }
        .input-area input { padding: 5px; font-size: 14px; margin-right: 5px; }
        .add-btn { padding: 6px 12px; font-size: 14px; cursor: pointer; }
        
        .wallet-summary { background-color: #f5f5f5; padding: 15px; border-radius: 6px; margin-top: 20px; max-width: 400px; border: 1px solid #ddd; }
        .wallet-summary h3 { margin: 8px 0; font-size: 16px; color: #333; }
        .wallet-summary span { font-weight: bold; font-size: 18px; }
        .calc-btn { width: 35px; height: 30px; font-size: 16px; font-weight: bold; cursor: pointer; margin-left: 5px; vertical-align: middle; }

        .action-btns { margin-top: 15px; display: flex; gap: 10px; }
        .cloud-save-btn { padding: 12px 24px; font-size: 16px; background-color: #0288D1; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .csv-btn { padding: 12px 24px; font-size: 16px; background-color: #757575; color: white; border: none; cursor: pointer; border-radius: 4px; }
        .loading-msg { color: #0288D1; font-weight: bold; margin-bottom: 10px; display: none; }

        .fix-col-name { position: sticky; left: 0; z-index: 3; background-color: #f9f9f9; min-width: 80px; }
        .fix-col-price { position: sticky; left: 102px; z-index: 3; background-color: #f9f9f9; min-width: 50px; }
        .fix-col-total { position: sticky; right: 0; z-index: 3; background-color: #f9f9f9; border-left: 2px solid #ccc; min-width: 60px; }
        thead tr { position: relative; z-index: 2; }
    </style>
</head>
<body>

    <h2>お小遣い記録（<span id="currentMonthTitle"></span>月度）</h2>

    <div class="input-area">
        <input type="text" id="newItemName" placeholder="例：お片付け" style="width: 120px;">
        <input type="number" id="newItemPrice" placeholder="例：5" style="width: 60px;">円
        <button class="add-btn" onclick="addNewRow()">追加</button>
    </div>

    <div id="loadingMessage" class="loading-msg">設定ファイルを読み込み中...</div>

    <div class="table-container">
        <table id="targetTable">
            <thead>
                <tr id="headerRow">
                    <th class="fix-col-name">項目</th>
                    <th class="fix-col-price">一回</th>
                    <th class="fix-col-total">合計</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
            <tfoot>
                <tr id="footerRow" class="total-row-footer">
                    <td class="fix-col-name">合計</td>
                    <td class="fix-col-price">-</td>
                    <td class="fix-col-total"><span id="grandTotal">0</span>円</td>
                </tr>
            </tfoot>
        </table>
    </div>

    <div class="wallet-summary">
        <h3>① これまでに稼いだお小遣い: <span id="earnedWallet" style="color: #2E7D32;">0</span> 円</h3>
        <h3>
            ② もらったお小遣い: <span id="paidWallet" style="color: #C62828;">0</span> 円
            <button class="calc-btn" onclick="changePaidWallet(-10)">-</button>
            <button class="calc-btn" onclick="changePaidWallet(10)">+</button>
        </h3>
        <hr style="border: 0; border-top: 1px solid #ccc;">
        <h3>③ まだもらっていないお小遣い: <span id="remainingWallet" style="color: #E65100; font-size: 22px;">0</span> 円</h3>
    </div>

    <div class="action-btns">
        <button class="cloud-save-btn" onclick="saveToSpreadsheet()">スプレッドシートに保存する</button>
        <button class="csv-btn" onclick="saveToCSV()">CSVダウンロード</button>
    </div>

    <script>
        // 設定を保持する変数（conf.propertiesから取得）
        let GAS_URL = "";
        let ADMIN_PASSWORD = "";

        let currentMonth = 0;
        let daysInMonth = 0;
        let todayDay = 0;
        let audioCtx = null;

        window.onload = function() {
            const today = new Date();
            currentMonth = today.getMonth() + 1;
            daysInMonth = new Date(today.getFullYear(), currentMonth, 0).getDate(); 
            todayDay = today.getDate();

            document.getElementById('currentMonthTitle').innerText = currentMonth;

            // 1. ヘッダーとフッター（日ごと合計）の枠を生成
            const headerRow = document.getElementById('headerRow');
            const footerRow = document.getElementById('footerRow');
            const totalHeader = headerRow.querySelector('.fix-col-total');
            const grandTotalCell = footerRow.querySelector('.fix-col-total');

            for (let d = 1; d <= daysInMonth; d++) {
                // ヘッダー作成
                const th = document.createElement('th');
                th.innerText = `${currentMonth}/${d}`;
                if (d === todayDay) th.classList.add('today-highlight');
                headerRow.insertBefore(th, totalHeader);

                // フッター（日ごと合計用td）作成
                const td = document.createElement('td');
                td.id = `day-total-${d}`;
                td.innerText = "0";
                if (d === todayDay) td.classList.add('today-highlight');
                footerRow.insertBefore(td, grandTotalCell);
            }

            // 2. プロパティファイルを読み込んでからGAS通信を開始
            loadConfigAndInit();
        };

        // ★【新機能】conf.propertiesを読み込む関数
        function loadConfigAndInit() {
            document.getElementById('loadingMessage').style.display = 'block';
            fetch('conf.properties')
                .then(res => {
                    if(!res.ok) throw new Error("conf.properties が見つかりません");
                    return res.text();
                })
                .then(text => {
                    // 行ごとに分解して解析
                    const lines = text.split('\n');
                    lines.forEach(line => {
                        const trimmed = line.trim();
                        if(trimmed.startsWith('#') || trimmed === "") return; // コメント行はスキップ
                        const parts = trimmed.split('=');
                        if(parts.length >= 2) {
                            const key = parts[0].trim();
                            const val = parts.slice(1).join('=').trim();
                            if(key === "GAS_URL") GAS_URL = val;
                            if(key === "ADMIN_PASSWORD") ADMIN_PASSWORD = val;
                        }
                    });
                    
                    // 読み込み終わったらGASからデータ取得
                    loadFromSpreadsheet();
                })
                .catch(err => {
                    alert("設定ファイルの読み込みに失敗しました。ファイル名や記述を確認してください。\n" + err.message);
                    document.getElementById('loadingMessage').innerText = "設定エラー";
                });
        }

        function playCoinSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = "sine"; 
                const now = audioCtx.currentTime;
                osc.frequency.setValueAtTime(587.33, now);
                osc.frequency.setValueAtTime(880.00, now + 0.06);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } catch (e) { console.error(e); }
        }

        function countUp(button) {
            playCoinSound();
            let currentCount = parseInt(button.innerText);
            currentCount++;
            button.innerText = currentCount;
            updateButtonColor(button);
            updateRowTotal(button.closest('tr'));
            calculateColumnTotals(); // ★カウントアップ時に縦の合計も再計算
        }

        function updateButtonColor(button) {
            const count = parseInt(button.innerText);
            if (count === 0) {
                button.classList.remove('active'); button.classList.add('zero');
            } else {
                button.classList.remove('zero'); button.classList.add('active');
            }
        }

        function updateRowTotal(row) {
            const priceText = row.querySelector('.fix-col-price').innerText;
            const price = parseInt(priceText.replace('円', ''));
            
            let totalCountInRow = 0;
            const buttons = row.querySelectorAll('.count-btn');
            buttons.forEach(btn => totalCountInRow += parseInt(btn.innerText));
            
            row.querySelector('.row-total').innerText = price * totalCountInRow;
            calculateTotalWallet();
        }

        // ★【新機能】縦（日ごと）の合計回数を集計してフッターに反映する
        function calculateColumnTotals() {
            const rows = document.querySelectorAll('#tableBody tr');
            let grandTotal = 0;

            for (let d = 1; d <= daysInMonth; d++) {
                let daySum = 0;
                rows.forEach(row => {
                    const price = parseInt(row.querySelector('.fix-col-price').innerText.replace('円', ''));
                    const buttons = row.querySelectorAll('.count-btn');
                    const count = parseInt(buttons[d - 1].innerText) || 0;
                    daySum += (count * price); // 回数 × 単価 をその日の合計に足す
                });
                document.getElementById(`day-total-${d}`).innerText = daySum + "円";
                grandTotal += daySum;
            }
            document.getElementById('grandTotal').innerText = grandTotal;
        }

        function calculateTotalWallet() {
            let earnedWallet = 0;
            const rowTotals = document.querySelectorAll('.row-total');
            rowTotals.forEach(span => earnedWallet += parseInt(span.innerText));
            
            document.getElementById('earnedWallet').innerText = earnedWallet;
            const paidWallet = parseInt(document.getElementById('paidWallet').innerText);
            document.getElementById('remainingWallet').innerText = earnedWallet - paidWallet;
        }

        // ★【仕様変更】ボタン操作時のパスワード要求をなくしました
        function changePaidWallet(amount) {
            const paidSpan = document.getElementById('paidWallet');
            let currentPaid = parseInt(paidSpan.innerText);
            currentPaid += amount;
            if (currentPaid < 0) currentPaid = 0;
            paidSpan.innerText = currentPaid;
            calculateTotalWallet();
        }

        function addNewRow() {
            const nameInput = document.getElementById('newItemName');
            const priceInput = document.getElementById('newItemPrice');
            const name = nameInput.value; const price = priceInput.value;

            if (name === "" || price === "") { alert("項目名と金額を入力してください！"); return; }
            createRowElement(name, price, []);
            nameInput.value = ""; priceInput.value = "";
            calculateColumnTotals();
        }

        function createRowElement(name, price, savedCounts) {
            const tbody = document.getElementById('tableBody');
            const newRow = document.createElement('tr');

            let rowHTML = `<td class="fix-col-name">${name}</td><td class="fix-col-price">${price}円</td>`;
            for (let d = 1; d <= daysInMonth; d++) {
                const countVal = savedCounts[d - 1] || 0;
                const todayClass = (d === todayDay) ? 'class="today-highlight"' : '';
                const btnColorClass = (countVal === 0) ? 'zero' : 'active';
                rowHTML += `<td ${todayClass}><button class="count-btn ${btnColorClass}" onclick="countUp(this)">${countVal}</button></td>`;
            }
            rowHTML += `<td class="fix-col-total"><span class="row-total">0</span>円</td>`;
            newRow.innerHTML = rowHTML;
            tbody.appendChild(newRow);

            updateRowTotal(newRow);
        }

        function saveToSpreadsheet() {
            if(!GAS_URL || GAS_URL.includes("ここにコピー")) { alert("GASのURLが正しく設定されていません。"); return; }

            // ★【仕様変更】保存時のみパスワードをチェック
            const inputPass = prompt("大人のパスワードを入力してください：");
            if (inputPass !== ADMIN_PASSWORD) { alert("パスワードが違います。"); return; }

            document.getElementById('loadingMessage').innerText = "スプレッドシートに保存中...";
            document.getElementById('loadingMessage').style.display = 'block';
            
            const rows = document.querySelectorAll('#tableBody tr');
            let itemsData = [];

            rows.forEach(row => {
                let rowData = {
                    name: row.querySelector('.fix-col-name').innerText,
                    price: parseInt(row.querySelector('.fix-col-price').innerText.replace('円', '')),
                    counts: []
                };
                const buttons = row.querySelectorAll('.count-btn');
                buttons.forEach(btn => rowData.counts.push(parseInt(btn.innerText)));
                itemsData.push(rowData);
            });

            const payload = {
                items: itemsData,
                paidWallet: parseInt(document.getElementById('paidWallet').innerText)
            };

            fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) })
            .then(res => res.json())
            .then(result => {
                document.getElementById('loadingMessage').style.display = 'none';
                alert("スプレッドシートに保存しました！");
            })
            .catch(err => {
                console.error(err);
                document.getElementById('loadingMessage').style.display = 'none';
                alert("保存に失敗しました。");
            });
        }

        function loadFromSpreadsheet() {
            if(!GAS_URL || GAS_URL.includes("ここにコピー")) return;

            document.getElementById('loadingMessage').innerText = "データを取得中...";
            document.getElementById('tableBody').innerHTML = "";

            fetch(GAS_URL)
            .then(res => res.json())
            .then(savedData => {
                if (savedData.items && savedData.items.length > 0) {
                    savedData.items.forEach(rowData => {
                        createRowElement(rowData.name, rowData.price, rowData.counts);
                    });
                }
                document.getElementById('paidWallet').innerText = savedData.paidWallet || 0;
                calculateTotalWallet();
                calculateColumnTotals(); // 縦の合計も初期集計
                document.getElementById('loadingMessage').style.display = 'none';
            })
            .catch(err => {
                console.error(err);
                document.getElementById('loadingMessage').innerText = "読込エラー";
            });
        }

        function saveToCSV() {
            const table = document.getElementById('targetTable');
            let csvContent = [];
            const headerCells = table.querySelectorAll('thead th');
            let headerRow = [];
            headerCells.forEach(cell => headerRow.push(cell.innerText));
            csvContent.push(headerRow.join(','));

            const rows = table.querySelectorAll('tbody tr');
            rows.forEach(row => {
                let rowData = [];
                rowData.push(row.querySelector('.fix-col-name').innerText);
                rowData.push(row.querySelector('.fix-col-price').innerText.replace('円', ''));
                const buttons = row.querySelectorAll('.count-btn');
                buttons.forEach(btn => rowData.push(btn.innerText));
                rowData.push(row.querySelector('.row-total').innerText);
                csvContent.push(rowData.join(','));
            });

            const csvString = "\uFEFF" + csvContent.join('\n');
            const blob = new Blob([csvString], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `okozukai_record_${currentMonth}gatsu.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }
    </script>
</body>
</html>
